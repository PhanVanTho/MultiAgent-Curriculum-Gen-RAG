<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pay.failed_title">Giao Dịch Thất Bại - Giáo Trình AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --danger: #ef4444;
            --bg-body: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .failed-card {
            background: white;
            border-radius: 32px;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: #fef2f2;
            color: var(--danger);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 2rem auto;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .status-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.75rem;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .status-desc {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .details-box {
            background: #fdf2f2;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            border: 1px solid #fecaca;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
        }

        .detail-label {
            color: #991b1b;
            font-weight: 500;
        }

        .detail-value {
            font-weight: 600;
            color: #7f1d1d;
        }

        .btn-retry {
            background: #0f172a;
            color: white;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            border: none;
            width: 100%;
            margin-bottom: 1rem;
        }

        .btn-retry:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            color: white;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
            width: 100%;
        }

        .btn-cancel:hover {
            background: #e2e8f0;
            color: #334155;
        }

        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .lang-btn-float {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.8);
            border: 1px solid #d1d5db;
            border-radius: 20px;
            color: #475569;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
            padding: 5px 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
            z-index: 999;
        }
        .lang-btn-float:hover { background: #f1f5f9; }
    </style>
</head>
<body>
    <button class="lang-btn-float" onclick="toggleLanguage()" title="Switch Language">
        <span id="langFlag">🇻🇳</span><span id="langLabel">VI</span>
    </button>
    <div class="failed-card">
        <div class="icon-wrapper">
            <i class="fa-solid fa-circle-xmark"></i>
        </div>
        <h1 class="status-title" data-i18n="pay.failed_title">Giao dịch thất bại!</h1>
        <p class="status-desc" data-i18n="pay.failed_desc">Rất tiếc. Đã xảy ra lỗi hoặc giao dịch nạp tiền của bạn đã bị hủy bỏ từ phía khách hàng.</p>

        <div class="details-box">
            <div class="detail-row">
                <span class="detail-label" data-i18n="pay.error_detail">Chi tiết lỗi</span>
                <span class="detail-value">{{ message }}</span>
            </div>
        </div>

        <a href="{{ url_for('buy_tokens') }}" class="btn-retry">
            <i class="fa-solid fa-rotate-right me-2"></i><span data-i18n="pay.retry">Thực hiện lại giao dịch</span>
        </a>
        <a href="{{ url_for('profile') }}" class="btn-cancel" data-i18n="pay.cancel_profile">
            Hủy và quay về trang cá nhân
        </a>
    </div>
    <script src="{{ url_for('static', filename='i18n.js') }}"></script>
</body>
</html>
