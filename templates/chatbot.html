{% if current_user.is_authenticated %}
<!-- Floating Chatbot Widget (Only for Logged In Users) -->
<div id="gtai-chatbot-container" class="gtai-chatbot-container">
    <!-- Chat Bubble -->
    <button id="gtai-chatbot-bubble" class="gtai-chatbot-bubble" onclick="toggleChatWindow()" title="Hỗ trợ trực tuyến">
        <i class="fa-solid fa-comments"></i>
        <span class="pulse-ring"></span>
    </button>

    <!-- Chat Window -->
    <div id="gtai-chatbot-window" class="gtai-chatbot-window d-none">
        <div class="gtai-chat-header">
            <div class="d-flex align-items-center gap-2">
                <div class="header-avatar">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div>
                    <h6 class="mb-0 text-white font-weight-bold" style="font-family: 'Space Grotesk', sans-serif;">Trợ lý Giáo Trình AI</h6>
                    <small class="text-emerald-light" style="font-size: 0.72rem; opacity: 0.9;">🟢 Đang trực tuyến</small>
                </div>
            </div>
            <button class="btn-close-chat" onclick="toggleChatWindow()">&times;</button>
        </div>

        <div id="gtai-chat-messages" class="gtai-chat-messages">
            <!-- Messages will be rendered here dynamically -->
        </div>

        <div id="gtai-chat-typing" class="gtai-chat-typing d-none">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <form id="gtai-chat-input-form" class="gtai-chat-input-form" onsubmit="handleChatSubmit(event)">
            <input type="text" id="gtai-chat-input" placeholder="Hỏi tôi về hệ thống..." autocomplete="off" required>
            <button type="submit" id="gtai-chat-send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </div>
</div>

<style>
    /* Chatbot Styles */
    .gtai-chatbot-container {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999;
        font-family: 'Inter', sans-serif;
    }
    
    /* Bubble Button */
    .gtai-chatbot-bubble {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #047857 0%, #10b981 100%);
        border: none;
        color: white;
        font-size: 1.6rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(4, 120, 87, 0.3);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
    }
    .gtai-chatbot-bubble:hover {
        transform: scale(1.08) translateY(-3px);
        box-shadow: 0 12px 28px rgba(4, 120, 87, 0.4);
    }
    
    /* Pulsing Notification Ring */
    .pulse-ring {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 50%;
        border: 2px solid #34d399;
        animation: chat-pulse 2s infinite;
        opacity: 0;
        pointer-events: none;
    }
    @keyframes chat-pulse {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { opacity: 0.3; }
        100% { transform: scale(1.3); opacity: 0; }
    }

    /* Chat Window */
    .gtai-chatbot-window {
        position: absolute;
        bottom: 75px;
        right: 0;
        width: 380px;
        height: 520px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(4, 120, 87, 0.18);
        border-radius: 24px;
        box-shadow: 0 12px 40px rgba(2, 44, 34, 0.15);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: chat-slide-in 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        max-width: calc(100vw - 60px);
    }
    @keyframes chat-slide-in {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Chat Header */
    .gtai-chat-header {
        background: linear-gradient(135deg, #022c22 0%, #064e3b 100%);
        padding: 18px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
    }
    .header-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #34d399;
        font-size: 1.1rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .text-emerald-light {
        color: #6ee7b7;
    }
    .btn-close-chat {
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.7);
        font-size: 1.6rem;
        cursor: pointer;
        transition: color 0.2s;
        line-height: 1;
        padding: 0;
    }
    .btn-close-chat:hover {
        color: white;
    }

    /* Message Area */
    .gtai-chat-messages {
        flex-grow: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: rgba(248, 250, 252, 0.6);
    }
    .gtai-chat-messages::-webkit-scrollbar {
        width: 5px;
    }
    .gtai-chat-messages::-webkit-scrollbar-track {
        background: transparent;
    }
    .gtai-chat-messages::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 99px;
    }

    /* Message Bubbles */
    .chat-msg {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 16px;
        font-size: 0.88rem;
        line-height: 1.45;
        word-wrap: break-word;
    }
    .chat-msg.bot {
        align-self: flex-start;
        background: white;
        color: #1e293b;
        border: 1px solid rgba(226, 232, 240, 0.8);
        border-top-left-radius: 4px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }
    .chat-msg.user {
        align-self: flex-end;
        background: linear-gradient(135deg, #047857 0%, #065f46 100%);
        color: white;
        border-top-right-radius: 4px;
        box-shadow: 0 4px 10px rgba(4, 120, 87, 0.15);
    }

    /* Typing Indicator */
    .gtai-chat-typing {
        align-self: flex-start;
        margin-left: 20px;
        margin-bottom: 12px;
        background: white;
        padding: 8px 14px;
        border-radius: 16px;
        border-top-left-radius: 4px;
        border: 1px solid rgba(226, 232, 240, 0.8);
        display: flex;
        gap: 4px;
    }
    .gtai-chat-typing .dot {
        width: 6px;
        height: 6px;
        background: #94a3b8;
        border-radius: 50%;
        animation: typing-bounce 1.4s infinite ease-in-out both;
    }
    .gtai-chat-typing .dot:nth-child(1) { animation-delay: -0.32s; }
    .gtai-chat-typing .dot:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes typing-bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1.0); }
    }

    /* Input Form */
    .gtai-chat-input-form {
        padding: 14px 16px;
        background: white;
        border-top: 1px solid rgba(226, 232, 240, 0.8);
        display: flex;
        gap: 8px;
    }
    .gtai-chat-input-form input {
        flex-grow: 1;
        border: 1px solid #e2e8f0;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 0.88rem;
        outline: none;
        transition: all 0.2s;
    }
    .gtai-chat-input-form input:focus {
        border-color: #10b981;
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }
    .gtai-chat-input-form button {
        background: #047857;
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.95rem;
        transition: background 0.2s, transform 0.1s;
    }
    .gtai-chat-input-form button:hover {
        background: #065f46;
    }
    .gtai-chat-input-form button:active {
        transform: scale(0.95);
    }
    .gtai-chat-input-form button:disabled {
        background: #cbd5e1;
        cursor: not-allowed;
    }
</style>

<script>
    // Chatbot JS Control Logic
    let isChatOpen = false;
    let chatHistory = [];

    // Load chat history from DB on startup
    window.addEventListener('DOMContentLoaded', () => {
        loadChatHistory();
    });

    async function loadChatHistory() {
        try {
            const response = await fetch('/api/chat/history');
            const data = await response.json();
            if (response.ok && data.history) {
                chatHistory = data.history;
            }
        } catch (err) {
            console.error('Failed to load chat history:', err);
        }

        // If no history, add welcoming bot message
        if (chatHistory.length === 0) {
            chatHistory.push({
                role: 'assistant',
                content: 'Xin chào! Tôi là trợ lý ảo của hệ thống Giáo Trình AI. Bạn có cần hỗ trợ gì về các chức năng, cách tạo giáo trình hoặc cách nạp token không?'
            });
        }
        
        renderChatMessages();
    }

    function toggleChatWindow() {
        const win = document.getElementById('gtai-chatbot-window');
        const bubble = document.getElementById('gtai-chatbot-bubble');
        isChatOpen = !isChatOpen;
        
        if (isChatOpen) {
            win.classList.remove('d-none');
            // Remove pulse ring after user interacts
            const pulse = bubble.querySelector('.pulse-ring');
            if (pulse) pulse.remove();
            
            // Scroll to bottom
            setTimeout(scrollToBottom, 50);
        } else {
            win.classList.add('d-none');
        }
    }

    function renderChatMessages() {
        const container = document.getElementById('gtai-chat-messages');
        if (!container) return;
        
        container.innerHTML = '';
        chatHistory.forEach(msg => {
            const div = document.createElement('div');
            div.classList.add('chat-msg', msg.role === 'assistant' ? 'bot' : 'user');
            div.innerText = msg.content;
            container.appendChild(div);
        });
    }

    function scrollToBottom() {
        const container = document.getElementById('gtai-chat-messages');
        if (container) {
            container.scrollTop = container.scrollHeight;
        }
    }

    async function handleChatSubmit(e) {
        e.preventDefault();
        
        const input = document.getElementById('gtai-chat-input');
        const sendBtn = document.getElementById('gtai-chat-send-btn');
        const typing = document.getElementById('gtai-chat-typing');
        
        const text = input.value.trim();
        if (!text) return;
        
        // Append user message to UI immediately
        chatHistory.push({ role: 'user', content: text });
        renderChatMessages();
        scrollToBottom();
        
        // Clear input and show typing indicator
        input.value = '';
        input.disabled = true;
        sendBtn.disabled = true;
        typing.classList.remove('d-none');
        scrollToBottom();
        
        try {
            // Call Flask API route /api/chat with user message
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: text
                })
            });
            
            const data = await response.json();
            
            if (response.ok && data.reply) {
                chatHistory.push({ role: 'assistant', content: data.reply });
            } else {
                chatHistory.push({ 
                    role: 'assistant', 
                    content: 'Rất tiếc, hệ thống đang gặp lỗi kết nối hoặc chưa cấu hình API Key. Vui lòng thử lại sau.' 
                });
            }
        } catch (err) {
            console.error(err);
            chatHistory.push({ 
                role: 'assistant', 
                content: 'Không thể kết nối đến máy chủ. Vui lòng kiểm tra lại kết nối mạng.' 
            });
        } finally {
            typing.classList.add('d-none');
            input.disabled = false;
            sendBtn.disabled = false;
            renderChatMessages();
            scrollToBottom();
            input.focus();
        }
    }
</script>
{% endif %}
